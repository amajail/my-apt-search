name: Deploy GitHub Pages

# Publishes the static site in web/ (the apartment-monitor frontend). Data JSON under
# web/data/ is pre-rendered locally by scripts/export_web.py and committed; this workflow
# only deploys the folder. Triggers on changes to web/ or manual dispatch.
on:
  push:
    branches: [master, main]
    paths: ["web/**", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - id: deployment
        uses: actions/deploy-pages@v4
